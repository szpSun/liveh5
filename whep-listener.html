<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>WHEP 音频收听测试</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 16px;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      button {
        padding: 6px 12px;
        margin-right: 8px;
      }
      #log {
        margin-top: 12px;
        padding: 8px;
        border: 1px solid #ddd;
        font-size: 12px;
        max-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h2>WHEP 音频收听测试</h2>
    <label>
      WHEP 地址：
      <input
        id="whepUrl"
        type="text"
        value="https://livenew.h3r.website/rtc/v1/whep/?app=audio&stream=13141431366"
      />
    </label>
    <div>
      <button id="btnConnect">开始收听</button>
      <button id="btnStop">停止</button>
    </div>
    <h3>音频：</h3>
    <audio id="audio" controls autoplay></audio>
    <h3>日志：</h3>
    <div id="log"></div>
    <script>
      const audio = document.getElementById('audio');
      const urlInput = document.getElementById('whepUrl');
      const logEl = document.getElementById('log');
      let pc = null;
      function log(...args) {
        const line = args
          .map((a) => (typeof a === 'string' ? a : JSON.stringify(a)))
          .join(' ');
        console.log('[WHEP]', line);
        logEl.textContent += line + '\n';
        logEl.scrollTop = logEl.scrollHeight;
      }
      function cleanup() {
        if (pc) {
          try {
            pc.ontrack = null;
            pc.oniceconnectionstatechange = null;
            pc.onconnectionstatechange = null;
            pc.close();
          } catch {}
          pc = null;
        }
        if (audio.srcObject) {
          try {
            audio.srcObject.getTracks().forEach((t) => t.stop());
          } catch {}
          audio.srcObject = null;
        }
      }
      async function waitIceGatheringComplete(conn) {
        if (conn.iceGatheringState === 'complete') return;
        await new Promise((resolve) => {
          const onChange = () => {
            if (conn.iceGatheringState === 'complete') {
              conn.removeEventListener('icegatheringstatechange', onChange);
              resolve();
            }
          };
          conn.addEventListener('icegatheringstatechange', onChange);
        });
      }
      async function startListen() {
        cleanup();
        const url = urlInput.value.trim();
        if (!url) {
          log('请填写 WHEP 地址');
          return;
        }
        log('开始连接 WHEP:', url);
        const conn = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
        });
        pc = conn;
        conn.addTransceiver('audio', { direction: 'recvonly' });
        conn.ontrack = (ev) => {
          const [stream] = ev.streams;
          if (stream) {
            log('收到音频流');
            audio.srcObject = stream;
          }
        };
        conn.oniceconnectionstatechange = () =>
          log('iceConnectionState =', conn.iceConnectionState);
        conn.onconnectionstatechange = () =>
          log('connectionState =', conn.connectionState);
        const offer = await conn.createOffer();
        await conn.setLocalDescription(offer);
        await waitIceGatheringComplete(conn);
        const localSdp = conn.localDescription && conn.localDescription.sdp;
        if (!localSdp) {
          log('生成 SDP 失败');
          return;
        }
        log('发送 SDP 到 WHEP ...');
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/sdp' },
          body: localSdp,
        });
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          log('WHEP 返回错误:', text || 'HTTP ' + res.status);
          return;
        }
        const answerSdp = await res.text();
        await conn.setRemoteDescription({ type: 'answer', sdp: answerSdp });
        log('已设置远端 SDP，等待连接变为 connected...');
      }
      document.getElementById('btnConnect').onclick = () => {
        startListen().catch((e) => log('异常:', e && e.message ? e.message : e));
      };
      document.getElementById('btnStop').onclick = () => {
        log('停止收听');
        cleanup();
      };
      window.addEventListener('beforeunload', cleanup);
    </script>
  </body>
</html>
