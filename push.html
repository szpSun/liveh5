<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>推流 + 二维码识别</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { font-size: 18px; margin: 0 0 12px; color: #fff; }
    .preview-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      max-height: 45vh;
      background: #0f0f1a;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .preview-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 14px;
      text-align: center;
      padding: 16px;
    }
    .live-status {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #fff;
    }
    .live-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #868e96;
    }
    .live-status-dot.pending { background: #ffd43b; }
    .live-status-dot.success { background: #51cf66; }
    .live-status-dot.idle { background: #868e96; }
    #canvas { display: none; }
    .status {
      padding: 10px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 40px;
    }
    .status.error { color: #ff6b6b; }
    .status.ok { color: #51cf66; }
    .status.pending { color: #ffd43b; }
    .btn-wrap { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
    button {
      flex: 1;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
      min-width: 0;
    }
    button:active { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btnStart { background: linear-gradient(135deg, #339af0, #228be6); color: #fff; }
    #btnStop { background: #495057; color: #fff; }
    #btnSwitch { background: rgba(255,255,255,0.15); color: #eee; flex: 0 0 auto; }
    /* 确保请求直播和停止直播按钮横向排列 */
    #btnStart, #btnStop {
      flex: 1 1 calc(50% - 6px);
    }
    .request-timer {
      margin-left: auto;
      font-size: 12px;
      color: #ffd43b;
      min-width: 140px;
      text-align: right;
      white-space: nowrap;
    }
    .section-title {
      font-size: 14px;
      margin: 16px 0 8px;
      color: #fff;
    }
    .tip {
      font-size: 12px;
      color: #868e96;
      margin-top: 16px;
      line-height: 1.5;
    }
    .play-urls {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      font-size: 12px;
    }
    .play-title { font-size: 14px; margin: 0 0 10px; color: #fff; }
    .play-item { margin: 6px 0; word-break: break-all; }
    .play-item a { color: #74c0fc; text-decoration: none; }
    .play-item a:active { opacity: 0.8; }
    .audio-play-wrap { display: flex; gap: 12px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
    .audio-play-wrap button { flex: 0 0 auto; padding: 10px 16px; font-size: 14px; }
    #btnPlayAudio { background: #2f9e44; color: #fff; }
    #btnStopAudio { background: #495057; color: #fff; }
    #remoteAudio { display: none; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header-row h1 { margin: 0; }
    .link-out { font-size: 14px; color: #74c0fc; text-decoration: none; }
    .link-out:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>直播 + 二维码识别</h1>
    <a href="index.html" class="link-out">退出</a>
  </div>
  <div class="preview-wrap">
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="preview-placeholder" id="placeholder">点击「请求直播」发起直播请求并获取摄像头，同时进行直播推流并识别画面中的二维码</div>
    <div class="live-status" id="liveStatus">
      <span class="live-status-dot idle" id="liveStatusDot"></span>
      <span class="live-status-text" id="liveStatusText">无请求</span>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="status pending" id="status">就绪</div>
  <div class="btn-wrap">
    <button id="btnStart">请求直播</button>
    <button id="btnStop" disabled>停止直播</button>
    <button id="btnSwitch" disabled title="推流过程中可切换前后摄像头">切换摄像头</button>
    <span id="requestTimer" class="request-timer"></span>
  </div>

  <p class="tip">
    直播结束后请点击「停止直播」按钮正常结束直播，否则本次直播可能被判定为无效；
    若因网络等不可控原因导致直播意外中断，可再次点击「请求直播」重新发起直播。
  </p>

  <div style="text-align: center; margin-top: 16px;">
    <button type="button" id="btnGotoWhep" style="padding: 10px 20px; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: rgba(255,255,255,0.15); color: #eee; transition: opacity 0.2s;">
      进入 WHEP 页面
    </button>
  </div>

  <!-- 隐藏的音频播放元素，保留功能但不显示UI -->
  <section class="play-urls" style="display: none;">
    <div class="audio-play-wrap">
      <span class="play-title" style="margin:0;">纯音频流 (WebRTC)</span>
      <button type="button" id="btnPlayAudio">播放音频</button>
      <button type="button" id="btnStopAudio" disabled>停止音频</button>
    </div>
  </section>
  <audio id="remoteAudio" autoplay playsinline style="display: none;"></audio>

  <!-- 隐藏的WHEP音频监听器UI，保留功能但不显示 -->
  <div style="display: none;">
    <h2 class="section-title" style="margin-top: 24px;">WHEP 音频监听器</h2>
    <div style="margin-bottom: 12px;">
      <label style="display: block; font-size: 13px; color: #adb5bd; margin-bottom: 6px;">WHEP 地址：</label>
      <input type="text" id="whepListenerUrl" style="width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; background: rgba(0,0,0,0.2); color: #eee; outline: none; box-sizing: border-box;" placeholder="输入 WHEP 地址" />
    </div>
    <div style="margin-bottom: 12px;">
      <button type="button" id="btnWhepConnect" style="padding: 10px 20px; margin-right: 8px; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #339af0, #228be6); color: #fff;">开始收听</button>
      <button type="button" id="btnWhepStop" style="padding: 10px 20px; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: #495057; color: #fff;" disabled>停止</button>
    </div>
    <div style="margin-bottom: 12px;">
      <h3 style="font-size: 14px; margin: 0 0 8px; color: #fff;">音频：</h3>
      <audio id="whepAudio" controls autoplay playsinline style="width: 100%;"></audio>
    </div>
    <div>
      <h3 style="font-size: 14px; margin: 0 0 8px; color: #fff;">日志：</h3>
      <div id="whepLog" style="padding: 12px; background: rgba(255,255,255,0.06); border-radius: 8px; font-size: 12px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; color: #adb5bd; min-height: 60px;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    (function () {
      const LOGIN_KEY = 'liveh5_login';
      if (!localStorage.getItem(LOGIN_KEY)) {
        window.location.href = 'index.html';
        throw new Error('redirect');
      }
      document.querySelector('.link-out').addEventListener('click', function (e) {
        localStorage.removeItem(LOGIN_KEY);
      });

      var loginData = {};
      try {
        var raw = localStorage.getItem(LOGIN_KEY);
        if (raw) loginData = JSON.parse(raw);
      } catch (_) {}
      var STREAM_NAME = (loginData.mobile || loginData.nickname || 'szp').toString().replace(/[^a-zA-Z0-9_]/g, '') || 'szp';
      var BASE = 'https://livenew.h3r.website';
      var SECRET = '18d44630c086480783f62f33dbb7e09a';

      // 直播请求 & 直播状态相关接口（基于业务后端）
      var API_BASE = 'https://livestream.h3r.website/app-api';
      var API_CHECK_REQUEST = API_BASE + '/user/check/request';
      var API_CREATE_REQUEST = API_BASE + '/user/request';
      var API_REQUEST_INFO = API_BASE + '/user/request/info';
      var API_CHECK_STATUS = API_BASE + '/user/check/status';
      var API_UPDATE_STREAM_STATE = API_BASE + '/livestore/stream/update/state';
      var API_SAVE_STREAM_URL = API_BASE + '/livestore/stream/save';
      var API_UPLOAD_PIC = API_BASE + '/livestore/upload/pic';
      var API_GET_LIVESTREAM = API_BASE + '/livestore';

      const WHIP_URL = BASE + '/rtc/v1/whip/?app=live&stream=' + STREAM_NAME + '&secret=' + SECRET;
      
      // 音频播放 URL 构建函数（延迟构建，确保手机号已加载）
      // WHEP 协议用于播放/拉流，WHIP 协议用于推流
      function getWhepAudioUrl(app) {
        var mobile = loginData.mobile || '';
        if (!mobile) {
          console.error('无法构建音频播放 URL：手机号为空');
          return null;
        }
        return BASE + '/rtc/v1/whep/?app=' + encodeURIComponent(app) + '&stream=' + encodeURIComponent(mobile);
      }
      const STORAGE_KEY = 'liveh5_qr_results';
      const DEDUPE_MS = 3000;
      const MAX_ITEMS = 30;

      const localVideo = document.getElementById('localVideo');
      const placeholder = document.getElementById('placeholder');
      const statusEl = document.getElementById('status');
      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const btnSwitch = document.getElementById('btnSwitch');
      const btnPlayAudio = document.getElementById('btnPlayAudio');
      const btnStopAudio = document.getElementById('btnStopAudio');
      const remoteAudio = document.getElementById('remoteAudio');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const liveStatusEl = document.getElementById('liveStatus');
      const liveStatusDot = document.getElementById('liveStatusDot');
      const liveStatusText = document.getElementById('liveStatusText');
      const requestTimerEl = document.getElementById('requestTimer');

      let pc = null;
      let localStream = null;
      let currentFacingMode = 'user';
      let playPc = null;
      let playPcAdmin1 = null;
      let qrRunning = false;
      let rafId = null;
      let lastQrData = '';
      let lastQrTime = 0;
      let statusPollTimer = null;
      let isPushing = false;
      let hasRequestedLive = false;
      let requestCountdownTimer = null;
      let requestCountdownEndTime = 0;
      let savedRequestId = null; // 保存请求直播时获取的 requestId
      let savedLiveStreamId = null; // 保存直播流的 ID

      // ===== 直播请求相关封装方法 =====
      function ensureLoginValid() {
        if (!loginData || !loginData.accessToken || !loginData.userId) {
          throw new Error('登录信息已失效，请重新登录后再发起直播');
        }
      }

      function getAuthHeaders(isJson) {
        ensureLoginValid();
        var h = {
          'Authorization': 'Bearer ' + loginData.accessToken
        };
        // 根据之前登录接口习惯，补充 Tenant-Id 方便网关识别；可按需调整
        h['Tenant-Id'] = '1';
        if (isJson) {
          h['Content-Type'] = 'application/json';
        }
        return h;
      }

      async function apiGet(url, userId) {
        var full = url + '?userId=' + encodeURIComponent(userId);
        var res = await fetch(full, {
          method: 'GET',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('接口请求失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '接口返回错误');
        }
        return json;
      }

      async function apiPost(url, userId) {
        // 根据后端报错“请求参数缺失:userId”推断，这里应该使用查询参数而不是 JSON Body
        var full = url + '?userId=' + encodeURIComponent(userId);
        var res = await fetch(full, {
          method: 'POST',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('接口请求失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '接口返回错误');
        }
        return json;
      }

      // 判断用户是否已经发起过直播请求
      async function checkHasLiveRequest(userId) {
        var json = await apiGet(API_CHECK_REQUEST, userId);
        return !!json.data;
      }

      // 发起直播请求
      async function createLiveRequest(userId) {
        var json = await apiPost(API_CREATE_REQUEST, userId);
        return json.data || null;
      }

      // 获取当前有效的直播请求详情
      async function getLiveRequestInfo(userId) {
        var json = await apiGet(API_REQUEST_INFO, userId);
        return json.data || null;
      }

      // 查询用户直播请求状态（若无请求返回 NO_REQUEST）
      async function getLiveRequestStatus(userId) {
        var json = await apiGet(API_CHECK_STATUS, userId);
        return typeof json.data === 'string' ? json.data : '';
      }

      // 根据用户ID更新直播状态（0-未开始 1-直播中 2-已结束 3-异常）
      async function updateLiveState(userId, state) {
        var full = API_UPDATE_STREAM_STATE
          + '?userId=' + encodeURIComponent(userId)
          + '&state=' + encodeURIComponent(state);
        var res = await fetch(full, {
          method: 'POST',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('更新直播状态失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '更新直播状态失败');
        }
        return json;
      }

      // 获取直播流信息（用于获取 liveStreamId）
      async function getLiveStreamInfo(userId) {
        var json = await apiGet(API_GET_LIVESTREAM, userId);
        return json.data || null;
      }

      // 上传二维码截图
      async function uploadQrPic(userId, liveStreamId, requestId, codeResult, imageBlob) {
        var url = API_UPLOAD_PIC
          + '?userId=' + encodeURIComponent(userId)
          + '&liveStreamId=' + encodeURIComponent(liveStreamId)
          + '&requestId=' + encodeURIComponent(requestId || '')
          + '&codeResult=' + encodeURIComponent(codeResult);
        
        var formData = new FormData();
        formData.append('file', imageBlob, 'qr_' + Date.now() + '.jpg');
        
        var headers = getAuthHeaders(false);
        // FormData 不需要手动设置 Content-Type，浏览器会自动设置并带上 boundary
        // 删除可能存在的 Content-Type，让浏览器自动设置
        delete headers['Content-Type'];
        
        var res = await fetch(url, {
          method: 'POST',
          headers: headers,
          body: formData
        });
        
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('上传二维码截图失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '上传二维码截图失败');
        }
        return json;
      }

      // 保存/更新用户直播流地址到 live_stream_list 表
      async function saveLiveStream(userId, url, requestId) {
        // 调试：输出参数值
        console.log('saveLiveStream 调用参数：', { userId: userId, url: url, requestId: requestId });
        
        var full = API_SAVE_STREAM_URL
          + '?userId=' + encodeURIComponent(userId)
          + '&url=' + encodeURIComponent(url)
          + '&requestId=' + encodeURIComponent(requestId || '');
        
        console.log('saveLiveStream 请求 URL：', full);
        
        var res = await fetch(full, {
          method: 'POST',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('保存直播流地址失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '保存直播流地址失败');
        }
        return json;
      }

      // 将后端状态码映射为更友好的中文文案
      function getReadableStatus(status) {
        switch (status) {
          case 'NO_REQUEST':
            return '无请求';
          case 'PENDING':
            return '待处理';
          case 'SUCCESS':
            return '已批准';
          case 'FAIL':
            return '已拒绝';
          case 'EXPIRED':
            return '已过期';
          default:
            return status || '未知';
        }
      }

      // 更新预览区域右上角的直播请求状态指示
      function updateLiveStatusIndicator(status) {
        if (!liveStatusEl || !liveStatusDot || !liveStatusText) return;
        var readable = getReadableStatus(status);
        liveStatusText.textContent = readable;
        var cls = 'live-status-dot ';
        if (status === 'SUCCESS') {
          cls += 'success';
        } else if (status === 'PENDING') {
          cls += 'pending';
        } else {
          cls += 'idle';
        }
        liveStatusDot.className = cls;
      }

      function isSecureContext() {
        return typeof window !== 'undefined' && window.isSecureContext && navigator.mediaDevices != null;
      }

      function getMediaErrorMessage(e) {
        if (!e || !e.name) return (e && e.message) || '无法获取摄像头/麦克风';
        switch (e.name) {
          case 'NotAllowedError':
          case 'PermissionDeniedError':
            return '未授权：请在浏览器中允许此页使用摄像头和麦克风。';
          case 'NotFoundError':
            return '未找到摄像头或麦克风设备。';
          case 'NotReadableError':
          case 'TrackStartError':
            return '设备被占用或无法访问，请关闭其他使用摄像头的应用后重试。';
          case 'SecurityError':
            return '安全限制：请用 HTTPS 或 localhost 打开此页。';
          case 'TypeError':
            if (!isSecureContext()) {
              return '请用 HTTPS 或 localhost 打开此页。';
            }
            return e.message || '无法获取摄像头/麦克风';
          default:
            return (e.message || e.name) + '（若用 Safari，请用 HTTPS 或 localhost 打开）';
        }
      }

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = 'status ' + (type || 'pending');
      }

      function setPreviewVisible(visible) {
        localVideo.style.display = visible ? 'block' : 'none';
        placeholder.style.display = visible ? 'none' : 'flex';
      }

      function loadResults() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (_) {
          return [];
        }
      }

      function saveResults(list) {
        const trimmed = list.slice(-MAX_ITEMS);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
        } catch (_) {}
        return trimmed;
      }

      // 生成"滴"声提示音
      function playBeep() {
        try {
          var audioContext = new (window.AudioContext || window.webkitAudioContext)();
          var oscillator = audioContext.createOscillator();
          var gainNode = audioContext.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          
          // 设置音调：800Hz，听起来像"滴"
          oscillator.frequency.value = 800;
          oscillator.type = 'sine';
          
          // 设置音量包络：快速上升，然后快速下降
          gainNode.gain.setValueAtTime(0, audioContext.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.3, audioContext.currentTime + 0.01);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
          
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.1);
          
          console.log('播放提示音：滴');
        } catch (e) {
          console.warn('播放提示音失败：', e);
          // 如果Web Audio API失败，尝试使用语音合成
          try {
            if ('speechSynthesis' in window) {
              var utterance = new SpeechSynthesisUtterance('滴');
              utterance.volume = 0.5;
              window.speechSynthesis.speak(utterance);
            }
          } catch (e2) {
            console.warn('备用提示音也失败：', e2);
          }
        }
      }

      function addResult(data, frameDataUrl) {
        const now = Date.now();
        if (data === lastQrData && (now - lastQrTime) < DEDUPE_MS) return false;
        lastQrData = data;
        lastQrTime = now;
        // 保存到本地存储（保留后端逻辑需要的数据）
        const list = loadResults();
        list.push({ data: data, time: now, frameDataUrl: frameDataUrl || null });
        saveResults(list);
        
        // 扫码成功后提示
        console.log('扫码成功，二维码内容：', data);
        // 播放"滴"声提示
        playBeep();
        
        // 上传二维码截图到服务器
        if (frameDataUrl && loginData && loginData.userId) {
          (async function() {
            try {
              // 将 base64 转换为 Blob
              var response = await fetch(frameDataUrl);
              var blob = await response.blob();
              
              // 使用保存的 liveStreamId，如果没有则使用 STREAM_NAME 作为后备
              var liveStreamId = savedLiveStreamId || STREAM_NAME;
              var userId = loginData.userId;
              var requestId = savedRequestId || '';
              
              await uploadQrPic(userId, liveStreamId, requestId, data, blob);
              console.log('二维码截图上传成功：', data);
            } catch (e) {
              console.warn('上传二维码截图失败：', e);
              // 静默失败，不影响本地保存
            }
          })();
        }
        
        return true;
      }


      function stopQrLoop() {
        qrRunning = false;
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      function qrTick() {
        if (!qrRunning || !localVideo.videoWidth) {
          rafId = requestAnimationFrame(qrTick);
          return;
        }
        canvas.width = localVideo.videoWidth;
        canvas.height = localVideo.videoHeight;
        ctx.drawImage(localVideo, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = typeof jsQR !== 'undefined' && jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          var frameDataUrl = (canvas.width && canvas.height) ? canvas.toDataURL('image/png') : null;
          addResult(code.data, frameDataUrl);
        }
        rafId = requestAnimationFrame(qrTick);
      }

      function startQrLoop() {
        qrRunning = true;
        rafId = requestAnimationFrame(qrTick);
      }

      if (!isSecureContext()) {
        setStatus('当前环境无法使用摄像头/麦克风。请用 HTTPS 或 localhost 打开此页（如 npx serve . -p 8080 后访问 http://localhost:8080）。', 'error');
      }


      function getStream(facingMode) {
        return navigator.mediaDevices.getUserMedia({
          video: facingMode ? { facingMode: facingMode } : true,
          audio: true
        });
      }

      // 进入页面后尝试提前获取摄像头/麦克风权限，避免真正开播时才弹窗
      async function prewarmMedia() {
        if (!isSecureContext()) return;
        if (localStream) return;
        try {
          localStream = await getStream(currentFacingMode);
          localVideo.srcObject = localStream;
          setPreviewVisible(true);
          setStatus('已获取摄像头/麦克风权限，等待直播请求。', 'pending');
        } catch (e) {
          console.warn('预获取摄像头/麦克风失败：', e);
        }
      }

      async function switchCamera() {
        if (!localStream) return;
        btnSwitch.disabled = true;
        setStatus('正在切换摄像头…', 'pending');
        var nextMode = currentFacingMode === 'user' ? 'environment' : 'user';
        try {
          var newStream = await getStream(nextMode);
          if (pc) {
            var senders = pc.getSenders();
            var videoTrack = newStream.getVideoTracks()[0];
            var audioTrack = newStream.getAudioTracks()[0];
            for (var i = 0; i < senders.length; i++) {
              if (senders[i].track && senders[i].track.kind === 'video' && videoTrack) {
                await senders[i].replaceTrack(videoTrack);
              }
              if (senders[i].track && senders[i].track.kind === 'audio' && audioTrack) {
                await senders[i].replaceTrack(audioTrack);
              }
            }
          }
          localStream.getTracks().forEach(function (t) { t.stop(); });
          localStream = newStream;
          localVideo.srcObject = localStream;
          currentFacingMode = nextMode;
          btnSwitch.textContent = currentFacingMode === 'user' ? '切换后摄' : '切换前摄';
          setStatus('推流已连接，画面中的二维码会自动识别并保存', 'ok');
        } catch (e) {
          setStatus('切换失败: ' + (e.message || e.name) + '（可能只有一颗摄像头）', 'error');
        }
        btnSwitch.disabled = false;
      }

      async function startPush() {
        if (!isSecureContext()) {
          setStatus('请用 HTTPS 或 localhost 打开此页后再试。', 'error');
          return;
        }
        btnStart.disabled = true;
        // 若还没有本地流，则此时获取；否则复用预先获取的流
        if (!localStream) {
          setStatus('正在获取摄像头/麦克风…', 'pending');
          try {
            localStream = await getStream(currentFacingMode);
            localVideo.srcObject = localStream;
            setPreviewVisible(true);
            setStatus('已获取媒体，正在连接推流服务器…', 'pending');
          } catch (e) {
            setStatus(getMediaErrorMessage(e), 'error');
            btnStart.disabled = false;
            return;
          }
        } else {
          localVideo.srcObject = localStream;
          setPreviewVisible(true);
          setStatus('正在连接推流服务器…', 'pending');
        }
        btnSwitch.disabled = false;
        btnSwitch.textContent = currentFacingMode === 'user' ? '切换后摄' : '切换前摄';
        startQrLoop();

        try {
          pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
          });
          pc.addEventListener('connectionstatechange', function () {
            if (pc && pc.connectionState === 'failed') {
              setStatus('连接失败，请检查网络或服务器', 'error');
            }
          });

          localStream.getTracks().forEach(function (track) {
            pc.addTrack(track, localStream);
          });

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          console.log('发送推流请求，URL：', WHIP_URL);
          const response = await fetch(WHIP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: offer.sdp
          });

          console.log('推流响应状态：', response.status, response.statusText);

          if (!response.ok) {
            const text = await response.text();
            var errorMsg = '服务器返回 ' + response.status + (text ? ': ' + text.slice(0, 200) : '');
            console.error('推流失败：', errorMsg);
            // 如果推流失败时音频正在播放，记录日志
            if (playPc) {
              console.warn('推流失败时音频播放连接状态：', playPc.connectionState);
            }
            if (playPcAdmin1) {
              console.warn('推流失败时 admin1 音频播放连接状态：', playPcAdmin1.connectionState);
            }
            throw new Error(errorMsg);
          }

          const answerSdp = await response.text();
          await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

          setStatus('推流已连接，画面中的二维码会自动识别并保存', 'ok');
          btnStop.disabled = false;
          isPushing = true;
        } catch (e) {
          setStatus('推流失败: ' + (e.message || e.name), 'error');
          stopPush();
          btnStart.disabled = false;
        }
      }

      function stopPush() {
        isPushing = false;
        btnSwitch.disabled = true;
        btnSwitch.textContent = '切换摄像头';
        stopQrLoop();
        if (pc) {
          pc.close();
          pc = null;
        }
        if (localStream) {
          localStream.getTracks().forEach(function (t) { t.stop(); });
          localStream = null;
        }
        localVideo.srcObject = null;
        setPreviewVisible(false);
        setStatus('已停止直播', 'pending');
        btnStart.disabled = false;
        btnStop.disabled = true;

        // 停止后不再轮询请求状态，也清理倒计时
        if (statusPollTimer) {
          clearInterval(statusPollTimer);
          statusPollTimer = null;
        }
        if (requestCountdownTimer) {
          clearInterval(requestCountdownTimer);
          requestCountdownTimer = null;
        }
        if (requestTimerEl) {
          requestTimerEl.textContent = '';
        }

        // 主动结束时，上报直播状态为“已结束”
        try {
          ensureLoginValid();
          updateLiveState(loginData.userId, 2); // 2-已结束
        } catch (_) {}

        // 用户主动停止后，本轮直播请求流程结束，不再根据 SUCCESS 自动重新开播
        hasRequestedLive = false;
        savedRequestId = null; // 清除保存的 requestId
        savedLiveStreamId = null; // 清除保存的 liveStreamId
      }

      async function startAudioPlay() {
        if (playPc || playPcAdmin1) return;
        if (!loginData || !loginData.mobile) {
          setStatus('无法播放音频：未获取到手机号', 'error');

        var whepAudioUrl = getWhepAudioUrl('admin');
        var whepAudioUrlAdmin1 = getWhepAudioUrl('admin1');
        if (!whepAudioUrl || !whepAudioUrlAdmin1) {
          setStatus('无法播放音频：手机号无效', 'error');
          return;
        }
        
        console.log('音频播放 URL (admin)：', whepAudioUrl);
        console.log('音频播放 URL (admin1)：', whepAudioUrlAdmin1);
        console.log('手机号：', loginData.mobile);
        
        btnPlayAudio.disabled = true;
        setStatus('正在连接音频流…', 'pending');
        
        // 创建合并的音频流
        var mergedStream = new MediaStream();
        
        try {
          // 连接第一个流 (admin)
          playPc = new RTCPeerConnection({
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
              { urls: 'stun:stun3.l.google.com:19302' },
              { urls: 'stun:stun4.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
          });
          playPc.addTransceiver('audio', { direction: 'recvonly' });
          playPc.ontrack = function (e) {
            if (e.track) {
              mergedStream.addTrack(e.track);
              if (!remoteAudio.srcObject) {
                remoteAudio.srcObject = mergedStream;
                remoteAudio.play().catch(function(err) {
                  console.warn('自动播放失败，需要用户交互：', err);
                });
              }
            }
          };
          
          // 连接第二个流 (admin1)
          playPcAdmin1 = new RTCPeerConnection({
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
              { urls: 'stun:stun3.l.google.com:19302' },
              { urls: 'stun:stun4.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
          });
          playPcAdmin1.addTransceiver('audio', { direction: 'recvonly' });
          playPcAdmin1.ontrack = function (e) {
            if (e.track) {
              mergedStream.addTrack(e.track);
              if (!remoteAudio.srcObject) {
                remoteAudio.srcObject = mergedStream;
                remoteAudio.play().catch(function(err) {
                  console.warn('自动播放失败，需要用户交互：', err);
                });
              }
            }
          };
          
          // 连接状态监听
          playPc.addEventListener('connectionstatechange', function () {
            if (playPc && playPc.connectionState === 'connected' && 
                playPcAdmin1 && playPcAdmin1.connectionState === 'connected') {
              setStatus('音频流已连接，正在播放', 'ok');
            } else if (playPc && playPc.connectionState === 'failed') {
              if (!isPushing) setStatus('音频连接失败', 'error');
            }
          });
          playPcAdmin1.addEventListener('connectionstatechange', function () {
            if (playPc && playPc.connectionState === 'connected' && 
                playPcAdmin1 && playPcAdmin1.connectionState === 'connected') {
              setStatus('音频流已连接，正在播放', 'ok');
            } else if (playPcAdmin1 && playPcAdmin1.connectionState === 'failed') {
              if (!isPushing) setStatus('音频连接失败', 'error');
            }
          });
          
          // 同时建立两个连接
          const offer1 = await playPc.createOffer();
          await playPc.setLocalDescription(offer1);
          const offer2 = await playPcAdmin1.createOffer();
          await playPcAdmin1.setLocalDescription(offer2);
          
          const [res1, res2] = await Promise.all([
            fetch(whepAudioUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/sdp' },
              body: playPc.localDescription.sdp
            }),
            fetch(whepAudioUrlAdmin1, {
              method: 'POST',
              headers: { 'Content-Type': 'application/sdp' },
              body: playPcAdmin1.localDescription.sdp
            })
          ]);
          
          if (!res1.ok || !res2.ok) {
            throw new Error('WHEP POST 失败');
          }
          
          await Promise.all([
            playPc.setRemoteDescription({ type: 'answer', sdp: await res1.text() }),
            playPcAdmin1.setRemoteDescription({ type: 'answer', sdp: await res2.text() })
          ]);
          
          btnPlayAudio.disabled = true;
          btnStopAudio.disabled = false;
        } catch (e) {
          console.error('播放音频异常：', e);
          var errorMsg = '播放音频失败: ' + (e.message || e.name);
          if (!isPushing) {
            setStatus(errorMsg, 'error');
          } else {
            console.warn(errorMsg + '（推流不受影响）');
          }
          stopAudioPlay();
          btnPlayAudio.disabled = false;
        }
      }

      function stopAudioPlay() {
        if (playPc) {
          try {
            playPc.close();
          } catch (e) {
            console.warn('关闭音频连接时出错：', e);
          }
          playPc = null;
        }
        if (playPcAdmin1) {
          try {
            playPcAdmin1.close();
          } catch (e) {
            console.warn('关闭 admin1 音频连接时出错：', e);
          }
          playPcAdmin1 = null;
        }
        if (remoteAudio && remoteAudio.srcObject) {
          try {
            remoteAudio.srcObject.getTracks().forEach(function(t) { t.stop(); });
          } catch (e) {
            console.warn('停止音频轨道时出错：', e);
          }
          remoteAudio.srcObject = null;
        }
        btnPlayAudio.disabled = false;
        btnStopAudio.disabled = true;
        // 只有在没有推流时才更新状态，避免覆盖推流状态
        if (!localStream && !pc) {
          setStatus('就绪', 'pending');
        }
      }

      // “请求直播”冷却倒计时：点击后 60 秒内按钮置灰，右侧显示读秒
      function startRequestCooldown() {
        const DURATION_SEC = 60;
        requestCountdownEndTime = Date.now() + DURATION_SEC * 1000;
        if (requestCountdownTimer) {
          clearInterval(requestCountdownTimer);
        }
        updateRequestTimer();
        requestCountdownTimer = setInterval(updateRequestTimer, 1000);
      }

      function updateRequestTimer() {
        if (!requestTimerEl) return;
        const remaining = requestCountdownEndTime - Date.now();
        if (remaining <= 0) {
          clearInterval(requestCountdownTimer);
          requestCountdownTimer = null;
          requestTimerEl.textContent = '';
          if (!isPushing) {
            btnStart.disabled = false;
          }
          return;
        }
        const sec = Math.ceil(remaining / 1000);
        btnStart.disabled = true;
        requestTimerEl.textContent = sec + ' 秒后可再次请求直播';
      }

      // 轮询获取用户直播请求状态，用于右上角状态点 & 自动在 SUCCESS 后开播
      function startStatusPolling() {
        if (!loginData.userId) return;
        if (statusPollTimer) return;
        // 立即刷新一次
        (async function () {
          try {
            const s = await getLiveRequestStatus(loginData.userId);
            updateLiveStatusIndicator(s);
          } catch (_) {}
        })();
        statusPollTimer = setInterval(async function () {
          try {
            const userId = loginData.userId;
            if (!userId) return;
            const status = await getLiveRequestStatus(userId);
            updateLiveStatusIndicator(status);
            // 只有在用户已发起过直播请求且当前还未推流、且按钮处于冷却中时，才考虑自动开播
            if (status === 'SUCCESS'
                && hasRequestedLive
                && !isPushing
                && requestCountdownTimer) {
              // 不再重新获取 info，直接使用保存的 requestId
              await handleApprovedAndStart(userId, null);
            }
          } catch (e) {
            // 静默失败，避免打扰用户
          }
        }, 3000);
      }

      // 当检测到 SUCCESS（无论是按钮请求后立即返回，还是轮询时返回）时，统一走这里：
      // 1. 保存直播流地址 2. 更新直播状态为“直播中” 3. 调用 startPush() 真正开播
      async function handleApprovedAndStart(userId, info) {
        if (isPushing) return;
        // 优先使用保存的 requestId，不再重新获取
        var requestId = savedRequestId || (info && info.requestId ? info.requestId : '');
        // 保存 WebRTC (WHEP) 播放地址
        var playUrl = BASE + '/rtc/v1/whep/?app=live&stream=' + STREAM_NAME;
        
        // 调试：输出最终要传递的参数
        console.log('准备调用 saveLiveStream，参数：', { userId: userId, playUrl: playUrl, requestId: requestId, savedRequestId: savedRequestId });
        
        // 无论是否有 requestId，都尝试调用保存接口（后端可能允许空 requestId）
        try {
          await saveLiveStream(userId, playUrl, requestId);
        } catch (eStream) {
          console.error('保存直播流地址失败：', eStream);
          // 不阻断后续开播，仅在控制台提示
        }
        
        try {
          await updateLiveState(userId, 1); // 1-直播中
        } catch (eState) {
          console.warn('更新直播状态为直播中失败：', eState);
        }
        
        // 获取直播流信息，保存 liveStreamId 供后续上传二维码截图使用
        try {
          var streamInfo = await getLiveStreamInfo(userId);
          if (streamInfo && streamInfo.id) {
            savedLiveStreamId = streamInfo.id;
            console.log('保存 liveStreamId：', savedLiveStreamId);
          }
        } catch (e) {
          console.warn('获取直播流信息失败：', e);
        }
        
        setStatus('直播请求已批准，正在开始直播推流…', 'ok');
        await startPush();
      }

      btnPlayAudio.addEventListener('click', startAudioPlay);
      btnStopAudio.addEventListener('click', stopAudioPlay);
      
      // 进入 WHEP 页面按钮
      const btnGotoWhep = document.getElementById('btnGotoWhep');
      if (btnGotoWhep) {
        btnGotoWhep.addEventListener('click', function() {
          window.location.href = 'whep-listener.html';
        });
      }

      // ===== WHEP 监听器功能（完整版） =====
      const whepListenerUrl = document.getElementById('whepListenerUrl');
      const btnWhepConnect = document.getElementById('btnWhepConnect');
      const btnWhepStop = document.getElementById('btnWhepStop');
      const whepAudio = document.getElementById('whepAudio');
      const whepLogEl = document.getElementById('whepLog');
      let whepListenerPc = null;

      // 初始化 WHEP 监听器 URL（使用当前登录用户的手机号）
      function initWhepUrl() {
        if (loginData && loginData.mobile) {
          var url = 'https://livenew.h3r.website/rtc/v1/whep/?app=audio&stream=' + encodeURIComponent(loginData.mobile);
          whepListenerUrl.value = url;
          return url;
        }
        return null;
      }
      
      // 初始化 URL
      initWhepUrl();

      function whepLog(...args) {
        const line = args
          .map((a) => (typeof a === 'string' ? a : JSON.stringify(a)))
          .join(' ');
        console.log('[WHEP监听器]', line);
        whepLogEl.textContent += line + '\n';
        whepLogEl.scrollTop = whepLogEl.scrollHeight;
      }

      function whepCleanup() {
        if (whepListenerPc) {
          try {
            whepListenerPc.ontrack = null;
            whepListenerPc.oniceconnectionstatechange = null;
            whepListenerPc.onconnectionstatechange = null;
            whepListenerPc.onicecandidate = null;
            whepListenerPc.close();
          } catch (e) {
            console.warn('关闭 WHEP 监听器连接时出错：', e);
          }
          whepListenerPc = null;
        }
        if (whepAudio && whepAudio.srcObject) {
          try {
            whepAudio.srcObject.getTracks().forEach((t) => t.stop());
          } catch (e) {

          }
          whepAudio.srcObject = null;
        }
      }

      async function startWhepListen() {
        whepCleanup();
        const url = whepListenerUrl.value.trim();
        if (!url) {
          whepLog('请填写 WHEP 地址');
          return;
        }
        whepLog('开始连接 WHEP:', url);
        btnWhepConnect.disabled = true;
        btnWhepStop.disabled = false;
        
        try {
          const conn = new RTCPeerConnection({
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
              { urls: 'stun:stun3.l.google.com:19302' },
              { urls: 'stun:stun4.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
          });
          whepListenerPc = conn;
          conn.addTransceiver('audio', { direction: 'recvonly' });
          conn.ontrack = (ev) => {
            const [stream] = ev.streams;
            if (stream) {
              whepLog('收到音频流');
              whepAudio.srcObject = stream;
            }
          };
          conn.oniceconnectionstatechange = () => {
            whepLog('iceConnectionState =', conn.iceConnectionState);
            if (conn.iceConnectionState === 'connected' || conn.iceConnectionState === 'completed') {
              whepLog('✓ ICE 连接成功！');
            } else if (conn.iceConnectionState === 'failed') {
              whepLog('✗ ICE 连接失败');
            }
          };
          conn.onconnectionstatechange = () => {
            whepLog('connectionState =', conn.connectionState);
            if (conn.connectionState === 'connected') {
              whepLog('✓ WebRTC 连接已建立！');
            } else if (conn.connectionState === 'failed') {
              whepLog('✗ WebRTC 连接失败');
              btnWhepConnect.disabled = false;
              btnWhepStop.disabled = true;
            }
          };
          conn.onicecandidate = (ev) => {
            if (ev.candidate) {
              whepLog('收到 ICE 候选:', ev.candidate.candidate.substring(0, 50) + '...');
            }
          };
          whepLog('创建 WebRTC offer...');
          const offer = await conn.createOffer();
          await conn.setLocalDescription(offer);
          
          whepLog('立即发送 SDP（不等待 ICE 收集完成）...');
          const localSdp = conn.localDescription && conn.localDescription.sdp;
          if (!localSdp) {
            whepLog('生成 SDP 失败');
            btnWhepConnect.disabled = false;
            btnWhepStop.disabled = true;
            return;
          }
          whepLog('发送 SDP 到 WHEP ...');
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: localSdp,
          });
          if (!res.ok) {
            const text = await res.text().catch(() => '');
            whepLog('WHEP 返回错误:', text || 'HTTP ' + res.status);
            btnWhepConnect.disabled = false;
            btnWhepStop.disabled = true;
            return;
          }
          const answerSdp = await res.text();
          await conn.setRemoteDescription({ type: 'answer', sdp: answerSdp });
          whepLog('已设置远端 SDP，等待连接变为 connected...');
        } catch (e) {
          whepLog('异常:', e && e.message ? e.message : e);
          whepCleanup();
          btnWhepConnect.disabled = false;
          btnWhepStop.disabled = true;
        }
      }

      function stopWhepListen() {
        whepLog('停止收听');
        whepCleanup();
        btnWhepConnect.disabled = false;
        btnWhepStop.disabled = true;
      }

      btnWhepConnect.addEventListener('click', () => {
        startWhepListen().catch((e) => whepLog('异常:', e && e.message ? e.message : e));
      });
      btnWhepStop.addEventListener('click', stopWhepListen);
      window.addEventListener('beforeunload', whepCleanup);

      // 页面加载完成后自动开始收听 WHEP 音频流
      function autoStartWhepListen() {
        // 确保登录数据已加载
        if (!loginData || !loginData.mobile) {
          console.warn('[自动WHEP] 未获取到手机号，延迟启动');
          setTimeout(autoStartWhepListen, 500);
          return;
        }
        
        // 初始化 URL
        var url = initWhepUrl();
        if (!url) {
          console.warn('[自动WHEP] 无法构建 URL');
          return;
        }
        
        console.log('[自动WHEP] 自动开始收听音频流:', url);
        whepLog('自动开始连接 WHEP 音频流...');
        startWhepListen().catch((e) => {
          console.error('[自动WHEP] 连接失败:', e);
          whepLog('自动连接失败:', e && e.message ? e.message : e);
        });
      }

      // 页面加载完成后自动启动
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          setTimeout(autoStartWhepListen, 500);
        });
      } else {
        setTimeout(autoStartWhepListen, 500);
      }

      // 点击"请求直播"按钮的处理：先发起/检查直播请求，只有审批通过才开始推流
      btnStart.addEventListener('click', async function () {
        try {
          ensureLoginValid();
        } catch (e) {
          setStatus(e.message || '登录已失效，请返回登录页重新登录', 'error');
          return;
        }

        var userId = loginData.userId;
        btnStart.disabled = true;
        setStatus('正在请求直播…', 'pending');

        try {
          // 先判断是否已有直播请求，没有则发起一个
          var hasReq = await checkHasLiveRequest(userId);
          if (!hasReq) {
            await createLiveRequest(userId);
          }
          hasRequestedLive = true;

          // 获取请求详情与状态，并保存 requestId
          var info = null;
          var status = '';
          try {
            info = await getLiveRequestInfo(userId);
            // 保存 requestId，供后续 SUCCESS 时使用
            if (info && info.requestId) {
              savedRequestId = info.requestId;
              console.log('保存 requestId：', savedRequestId);
            }
          } catch (_) {}
          try {
            status = await getLiveRequestStatus(userId);
          } catch (_) {}

          // 成功发起/获取直播请求后，启动 3 分钟冷却倒计时 & 状态轮询
          startRequestCooldown();
          startStatusPolling();

          // 使用后端约定的状态：
          // NO_REQUEST-无请求、PENDING-待处理、SUCCESS-已批准、FAIL-已拒绝、EXPIRED-已过期
          if (status === 'SUCCESS') {
            // 若立即返回 SUCCESS，则直接开始直播
            await handleApprovedAndStart(userId, info);
          } else {
            var readable = getReadableStatus(status);
            setStatus('当前直播请求状态为：' + readable + '，暂不能开始直播推流，请等待审核通过或重新发起请求。', 'pending');
            // 此时按钮保持置灰，由冷却倒计时恢复
          }
        } catch (e) {
          setStatus((e && e.message) ? ('请求直播失败：' + e.message) : '请求直播失败', 'error');
          btnStart.disabled = false;
        }
      });
      btnStop.addEventListener('click', stopPush);
      btnSwitch.addEventListener('click', switchCamera);
      // 进入页面时，尝试预获取媒体权限（不自动轮询状态，只有请求直播后才轮询）
      prewarmMedia();
    })();
  </script>
</body>
</html>
