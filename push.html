<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>推流 + 二维码识别</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    h1 { font-size: 18px; margin: 0 0 12px; color: #fff; }
    .preview-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      max-height: 45vh;
      background: #0f0f1a;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .preview-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 14px;
      text-align: center;
      padding: 16px;
    }
    .live-status {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #fff;
    }
    .live-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #868e96;
    }
    .live-status-dot.pending { background: #ffd43b; }
    .live-status-dot.success { background: #51cf66; }
    .live-status-dot.idle { background: #868e96; }
    #canvas { display: none; }
    .status {
      padding: 10px 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 40px;
    }
    .status.error { color: #ff6b6b; }
    .status.ok { color: #51cf66; }
    .status.pending { color: #ffd43b; }
    .btn-wrap { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
    button {
      flex: 1;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btnStart { background: linear-gradient(135deg, #339af0, #228be6); color: #fff; }
    #btnStop { background: #495057; color: #fff; }
    #btnSwitch { background: rgba(255,255,255,0.15); color: #eee; flex: 0 0 auto; }
    .request-timer {
      margin-left: auto;
      font-size: 12px;
      color: #ffd43b;
      min-width: 140px;
      text-align: right;
      white-space: nowrap;
    }
    .section-title {
      font-size: 14px;
      margin: 16px 0 8px;
      color: #fff;
    }
    .qr-log {
      padding: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      font-size: 12px;
      max-height: 50vh;
      overflow-y: auto;
    }
    .qr-log-item {
      margin: 12px 0;
      padding: 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      word-break: break-all;
      border-left: 3px solid #51cf66;
    }
    .qr-log-item:first-child { margin-top: 0; }
    .qr-log-item-frame {
      display: block;
      width: 100%;
      max-height: 28vh;
      object-fit: contain;
      border-radius: 6px;
      background: #0f0f1a;
      margin-bottom: 8px;
    }
    .qr-log-item-meta { color: #868e96; font-size: 11px; margin-bottom: 4px; }
    .qr-log-item-data { font-size: 12px; }
    .qr-log-item time { color: #868e96; font-size: 11px; margin-right: 8px; }
    .qr-log-empty { color: #868e96; }
    .btn-clear {
      margin-top: 8px;
      padding: 8px 14px;
      font-size: 13px;
      background: rgba(255,255,255,0.1);
      color: #eee;
      width: 100%;
    }
    .tip {
      font-size: 12px;
      color: #868e96;
      margin-top: 16px;
      line-height: 1.5;
    }
    .play-urls {
      margin-top: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      font-size: 12px;
    }
    .play-title { font-size: 14px; margin: 0 0 10px; color: #fff; }
    .play-item { margin: 6px 0; word-break: break-all; }
    .play-item a { color: #74c0fc; text-decoration: none; }
    .play-item a:active { opacity: 0.8; }
    .audio-play-wrap { display: flex; gap: 12px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
    .audio-play-wrap button { flex: 0 0 auto; padding: 10px 16px; font-size: 14px; }
    #btnPlayAudio { background: #2f9e44; color: #fff; }
    #btnStopAudio { background: #495057; color: #fff; }
    #remoteAudio { display: none; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header-row h1 { margin: 0; }
    .link-out { font-size: 14px; color: #74c0fc; text-decoration: none; }
    .link-out:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>直播 + 二维码识别</h1>
    <a href="index.html" class="link-out">退出</a>
  </div>
  <div class="preview-wrap">
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="preview-placeholder" id="placeholder">点击「请求直播」发起直播请求并获取摄像头，同时进行直播推流并识别画面中的二维码</div>
    <div class="live-status" id="liveStatus">
      <span class="live-status-dot idle" id="liveStatusDot"></span>
      <span class="live-status-text" id="liveStatusText">无请求</span>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="status pending" id="status">就绪</div>
  <div class="btn-wrap">
    <button id="btnStart">请求直播</button>
    <button id="btnStop" disabled>停止直播</button>
    <button id="btnSwitch" disabled title="推流过程中可切换前后摄像头">切换摄像头</button>
    <span id="requestTimer" class="request-timer"></span>
  </div>

  <h2 class="section-title">识别记录</h2>
  <div class="qr-log" id="qrLog"></div>
  <button type="button" class="btn-clear" id="btnClearLog">清空记录</button>

  <p class="tip">需用 <strong>HTTPS 或 localhost</strong> 打开此页。发起直播并开始推流后会对画面做二维码识别，<strong>每次识别到二维码会保存该帧画面与内容</strong>，显示在下方的识别记录中（同一二维码 3 秒内不重复）。</p>
  <section class="play-urls">
    <div class="audio-play-wrap">
      <span class="play-title" style="margin:0;">纯音频流 (WebRTC)</span>
      <button type="button" id="btnPlayAudio">播放音频</button>
      <button type="button" id="btnStopAudio" disabled>停止音频</button>
    </div>
  </section>
  <audio id="remoteAudio" autoplay playsinline></audio>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    (function () {
      const LOGIN_KEY = 'liveh5_login';
      if (!localStorage.getItem(LOGIN_KEY)) {
        window.location.href = 'index.html';
        throw new Error('redirect');
      }
      document.querySelector('.link-out').addEventListener('click', function (e) {
        localStorage.removeItem(LOGIN_KEY);
      });

      var loginData = {};
      try {
        var raw = localStorage.getItem(LOGIN_KEY);
        if (raw) loginData = JSON.parse(raw);
      } catch (_) {}
      var STREAM_NAME = (loginData.mobile || loginData.nickname || 'szp').toString().replace(/[^a-zA-Z0-9_]/g, '') || 'szp';
      var BASE = 'https://livenew.h3r.website';
      var SECRET = '18d44630c086480783f62f33dbb7e09a';

      // 直播请求 & 直播状态相关接口（基于业务后端）
      var API_BASE = 'https://livestream.h3r.website/app-api';
      var API_CHECK_REQUEST = API_BASE + '/user/check/request';
      var API_CREATE_REQUEST = API_BASE + '/user/request';
      var API_REQUEST_INFO = API_BASE + '/user/request/info';
      var API_CHECK_STATUS = API_BASE + '/user/check/status';
      var API_UPDATE_STREAM_STATE = API_BASE + '/livestore/stream/update/state';
      var API_SAVE_STREAM_URL = API_BASE + '/livestore/stream/save';
      var API_UPLOAD_PIC = API_BASE + '/livestore/upload/pic';
      var API_GET_LIVESTREAM = API_BASE + '/livestore';

      const WHIP_URL = BASE + '/rtc/v1/whip/?app=live&stream=' + STREAM_NAME + '&secret=' + SECRET;
      // 音频播放使用 WHIP 协议，stream 参数为登录的手机号
      var mobile = loginData.mobile || '';
      var WHIP_AUDIO_URL = BASE + '/rtc/v1/whip/?app=audio&stream=' + encodeURIComponent(mobile) + '&secret=' + SECRET;
      const STORAGE_KEY = 'liveh5_qr_results';
      const DEDUPE_MS = 3000;
      const MAX_ITEMS = 30;

      const localVideo = document.getElementById('localVideo');
      const placeholder = document.getElementById('placeholder');
      const statusEl = document.getElementById('status');
      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const btnSwitch = document.getElementById('btnSwitch');
      const btnPlayAudio = document.getElementById('btnPlayAudio');
      const btnStopAudio = document.getElementById('btnStopAudio');
      const remoteAudio = document.getElementById('remoteAudio');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const qrLogEl = document.getElementById('qrLog');
      const btnClearLog = document.getElementById('btnClearLog');
      const liveStatusEl = document.getElementById('liveStatus');
      const liveStatusDot = document.getElementById('liveStatusDot');
      const liveStatusText = document.getElementById('liveStatusText');
      const requestTimerEl = document.getElementById('requestTimer');

      let pc = null;
      let localStream = null;
      let currentFacingMode = 'user';
      let playPc = null;
      let qrRunning = false;
      let rafId = null;
      let lastQrData = '';
      let lastQrTime = 0;
      let statusPollTimer = null;
      let isPushing = false;
      let hasRequestedLive = false;
      let requestCountdownTimer = null;
      let requestCountdownEndTime = 0;
      let savedRequestId = null; // 保存请求直播时获取的 requestId
      let savedLiveStreamId = null; // 保存直播流的 ID

      // ===== 直播请求相关封装方法 =====
      function ensureLoginValid() {
        if (!loginData || !loginData.accessToken || !loginData.userId) {
          throw new Error('登录信息已失效，请重新登录后再发起直播');
        }
      }

      function getAuthHeaders(isJson) {
        ensureLoginValid();
        var h = {
          'Authorization': 'Bearer ' + loginData.accessToken
        };
        // 根据之前登录接口习惯，补充 Tenant-Id 方便网关识别；可按需调整
        h['Tenant-Id'] = '1';
        if (isJson) {
          h['Content-Type'] = 'application/json';
        }
        return h;
      }

      async function apiGet(url, userId) {
        var full = url + '?userId=' + encodeURIComponent(userId);
        var res = await fetch(full, {
          method: 'GET',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('接口请求失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '接口返回错误');
        }
        return json;
      }

      async function apiPost(url, userId) {
        // 根据后端报错“请求参数缺失:userId”推断，这里应该使用查询参数而不是 JSON Body
        var full = url + '?userId=' + encodeURIComponent(userId);
        var res = await fetch(full, {
          method: 'POST',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('接口请求失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '接口返回错误');
        }
        return json;
      }

      // 判断用户是否已经发起过直播请求
      async function checkHasLiveRequest(userId) {
        var json = await apiGet(API_CHECK_REQUEST, userId);
        return !!json.data;
      }

      // 发起直播请求
      async function createLiveRequest(userId) {
        var json = await apiPost(API_CREATE_REQUEST, userId);
        return json.data || null;
      }

      // 获取当前有效的直播请求详情
      async function getLiveRequestInfo(userId) {
        var json = await apiGet(API_REQUEST_INFO, userId);
        return json.data || null;
      }

      // 查询用户直播请求状态（若无请求返回 NO_REQUEST）
      async function getLiveRequestStatus(userId) {
        var json = await apiGet(API_CHECK_STATUS, userId);
        return typeof json.data === 'string' ? json.data : '';
      }

      // 根据用户ID更新直播状态（0-未开始 1-直播中 2-已结束 3-异常）
      async function updateLiveState(userId, state) {
        var full = API_UPDATE_STREAM_STATE
          + '?userId=' + encodeURIComponent(userId)
          + '&state=' + encodeURIComponent(state);
        var res = await fetch(full, {
          method: 'POST',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('更新直播状态失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '更新直播状态失败');
        }
        return json;
      }

      // 获取直播流信息（用于获取 liveStreamId）
      async function getLiveStreamInfo(userId) {
        var json = await apiGet(API_GET_LIVESTREAM, userId);
        return json.data || null;
      }

      // 上传二维码截图
      async function uploadQrPic(userId, liveStreamId, requestId, codeResult, imageBlob) {
        var url = API_UPLOAD_PIC
          + '?userId=' + encodeURIComponent(userId)
          + '&liveStreamId=' + encodeURIComponent(liveStreamId)
          + '&requestId=' + encodeURIComponent(requestId || '')
          + '&codeResult=' + encodeURIComponent(codeResult);
        
        var formData = new FormData();
        formData.append('file', imageBlob, 'qr_' + Date.now() + '.jpg');
        
        var headers = getAuthHeaders(false);
        // FormData 不需要手动设置 Content-Type，浏览器会自动设置并带上 boundary
        // 删除可能存在的 Content-Type，让浏览器自动设置
        delete headers['Content-Type'];
        
        var res = await fetch(url, {
          method: 'POST',
          headers: headers,
          body: formData
        });
        
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('上传二维码截图失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '上传二维码截图失败');
        }
        return json;
      }

      // 保存/更新用户直播流地址到 live_stream_list 表
      async function saveLiveStream(userId, url, requestId) {
        // 调试：输出参数值
        console.log('saveLiveStream 调用参数：', { userId: userId, url: url, requestId: requestId });
        
        var full = API_SAVE_STREAM_URL
          + '?userId=' + encodeURIComponent(userId)
          + '&url=' + encodeURIComponent(url)
          + '&requestId=' + encodeURIComponent(requestId || '');
        
        console.log('saveLiveStream 请求 URL：', full);
        
        var res = await fetch(full, {
          method: 'POST',
          headers: getAuthHeaders(false)
        });
        if (!res.ok) {
          var txt = '';
          try { txt = await res.text(); } catch (_) {}
          throw new Error('保存直播流地址失败：' + res.status + (txt ? ' - ' + txt.slice(0, 120) : ''));
        }
        var json = await res.json();
        if (json.code !== 0) {
          throw new Error(json.msg || '保存直播流地址失败');
        }
        return json;
      }

      // 将后端状态码映射为更友好的中文文案
      function getReadableStatus(status) {
        switch (status) {
          case 'NO_REQUEST':
            return '无请求';
          case 'PENDING':
            return '待处理';
          case 'SUCCESS':
            return '已批准';
          case 'FAIL':
            return '已拒绝';
          case 'EXPIRED':
            return '已过期';
          default:
            return status || '未知';
        }
      }

      // 更新预览区域右上角的直播请求状态指示
      function updateLiveStatusIndicator(status) {
        if (!liveStatusEl || !liveStatusDot || !liveStatusText) return;
        var readable = getReadableStatus(status);
        liveStatusText.textContent = readable;
        var cls = 'live-status-dot ';
        if (status === 'SUCCESS') {
          cls += 'success';
        } else if (status === 'PENDING') {
          cls += 'pending';
        } else {
          cls += 'idle';
        }
        liveStatusDot.className = cls;
      }

      function isSecureContext() {
        return typeof window !== 'undefined' && window.isSecureContext && navigator.mediaDevices != null;
      }

      function getMediaErrorMessage(e) {
        if (!e || !e.name) return (e && e.message) || '无法获取摄像头/麦克风';
        switch (e.name) {
          case 'NotAllowedError':
          case 'PermissionDeniedError':
            return '未授权：请在浏览器中允许此页使用摄像头和麦克风。';
          case 'NotFoundError':
            return '未找到摄像头或麦克风设备。';
          case 'NotReadableError':
          case 'TrackStartError':
            return '设备被占用或无法访问，请关闭其他使用摄像头的应用后重试。';
          case 'SecurityError':
            return '安全限制：请用 HTTPS 或 localhost 打开此页。';
          case 'TypeError':
            if (!isSecureContext()) {
              return '请用 HTTPS 或 localhost 打开此页。';
            }
            return e.message || '无法获取摄像头/麦克风';
          default:
            return (e.message || e.name) + '（若用 Safari，请用 HTTPS 或 localhost 打开）';
        }
      }

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = 'status ' + (type || 'pending');
      }

      function setPreviewVisible(visible) {
        localVideo.style.display = visible ? 'block' : 'none';
        placeholder.style.display = visible ? 'none' : 'flex';
      }

      function loadResults() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (_) {
          return [];
        }
      }

      function saveResults(list) {
        const trimmed = list.slice(-MAX_ITEMS);
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
        } catch (_) {}
        return trimmed;
      }

      function addResult(data, frameDataUrl) {
        const now = Date.now();
        if (data === lastQrData && (now - lastQrTime) < DEDUPE_MS) return false;
        lastQrData = data;
        lastQrTime = now;
        const list = loadResults();
        list.push({ data: data, time: now, frameDataUrl: frameDataUrl || null });
        saveResults(list);
        renderLog();
        
        // 上传二维码截图到服务器
        if (frameDataUrl && loginData && loginData.userId) {
          (async function() {
            try {
              // 将 base64 转换为 Blob
              var response = await fetch(frameDataUrl);
              var blob = await response.blob();
              
              // 使用保存的 liveStreamId，如果没有则使用 STREAM_NAME 作为后备
              var liveStreamId = savedLiveStreamId || STREAM_NAME;
              var userId = loginData.userId;
              var requestId = savedRequestId || '';
              
              await uploadQrPic(userId, liveStreamId, requestId, data, blob);
              console.log('二维码截图上传成功：', data);
            } catch (e) {
              console.warn('上传二维码截图失败：', e);
              // 静默失败，不影响本地保存
            }
          })();
        }
        
        return true;
      }

      function renderLog() {
        const list = loadResults();
        if (list.length === 0) {
          qrLogEl.innerHTML = '<div class="qr-log-empty">暂无记录，推流后对准二维码即可识别并保存（每条会显示该帧画面与扫到的内容）</div>';
          return;
        }
        qrLogEl.innerHTML = list
          .slice()
          .reverse()
          .map(function (item) {
            const t = new Date(item.time);
            const timeStr = t.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const imgHtml = item.frameDataUrl
              ? '<img class="qr-log-item-frame" src="' + item.frameDataUrl.replace(/"/g, '&quot;') + '" alt="识别时的画面" />'
              : '';
            return '<div class="qr-log-item">' + imgHtml + '<div class="qr-log-item-meta"><time>' + timeStr + '</time></div><div class="qr-log-item-data">' + escapeHtml(item.data) + '</div></div>';
          })
          .join('');
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function stopQrLoop() {
        qrRunning = false;
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      function qrTick() {
        if (!qrRunning || !localVideo.videoWidth) {
          rafId = requestAnimationFrame(qrTick);
          return;
        }
        canvas.width = localVideo.videoWidth;
        canvas.height = localVideo.videoHeight;
        ctx.drawImage(localVideo, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = typeof jsQR !== 'undefined' && jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          var frameDataUrl = (canvas.width && canvas.height) ? canvas.toDataURL('image/png') : null;
          addResult(code.data, frameDataUrl);
        }
        rafId = requestAnimationFrame(qrTick);
      }

      function startQrLoop() {
        qrRunning = true;
        rafId = requestAnimationFrame(qrTick);
      }

      if (!isSecureContext()) {
        setStatus('当前环境无法使用摄像头/麦克风。请用 HTTPS 或 localhost 打开此页（如 npx serve . -p 8080 后访问 http://localhost:8080）。', 'error');
      }

      renderLog();

      btnClearLog.addEventListener('click', function () {
        saveResults([]);
        renderLog();
      });

      function getStream(facingMode) {
        return navigator.mediaDevices.getUserMedia({
          video: facingMode ? { facingMode: facingMode } : true,
          audio: true
        });
      }

      // 进入页面后尝试提前获取摄像头/麦克风权限，避免真正开播时才弹窗
      async function prewarmMedia() {
        if (!isSecureContext()) return;
        if (localStream) return;
        try {
          localStream = await getStream(currentFacingMode);
          localVideo.srcObject = localStream;
          setPreviewVisible(true);
          setStatus('已获取摄像头/麦克风权限，等待直播请求。', 'pending');
        } catch (e) {
          console.warn('预获取摄像头/麦克风失败：', e);
        }
      }

      async function switchCamera() {
        if (!localStream) return;
        btnSwitch.disabled = true;
        setStatus('正在切换摄像头…', 'pending');
        var nextMode = currentFacingMode === 'user' ? 'environment' : 'user';
        try {
          var newStream = await getStream(nextMode);
          if (pc) {
            var senders = pc.getSenders();
            var videoTrack = newStream.getVideoTracks()[0];
            var audioTrack = newStream.getAudioTracks()[0];
            for (var i = 0; i < senders.length; i++) {
              if (senders[i].track && senders[i].track.kind === 'video' && videoTrack) {
                await senders[i].replaceTrack(videoTrack);
              }
              if (senders[i].track && senders[i].track.kind === 'audio' && audioTrack) {
                await senders[i].replaceTrack(audioTrack);
              }
            }
          }
          localStream.getTracks().forEach(function (t) { t.stop(); });
          localStream = newStream;
          localVideo.srcObject = localStream;
          currentFacingMode = nextMode;
          btnSwitch.textContent = currentFacingMode === 'user' ? '切换后摄' : '切换前摄';
          setStatus('推流已连接，画面中的二维码会自动识别并保存', 'ok');
        } catch (e) {
          setStatus('切换失败: ' + (e.message || e.name) + '（可能只有一颗摄像头）', 'error');
        }
        btnSwitch.disabled = false;
      }

      async function startPush() {
        if (!isSecureContext()) {
          setStatus('请用 HTTPS 或 localhost 打开此页后再试。', 'error');
          return;
        }
        btnStart.disabled = true;
        // 若还没有本地流，则此时获取；否则复用预先获取的流
        if (!localStream) {
          setStatus('正在获取摄像头/麦克风…', 'pending');
          try {
            localStream = await getStream(currentFacingMode);
            localVideo.srcObject = localStream;
            setPreviewVisible(true);
            setStatus('已获取媒体，正在连接推流服务器…', 'pending');
          } catch (e) {
            setStatus(getMediaErrorMessage(e), 'error');
            btnStart.disabled = false;
            return;
          }
        } else {
          localVideo.srcObject = localStream;
          setPreviewVisible(true);
          setStatus('正在连接推流服务器…', 'pending');
        }
        btnSwitch.disabled = false;
        btnSwitch.textContent = currentFacingMode === 'user' ? '切换后摄' : '切换前摄';
        startQrLoop();

        try {
          pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
          });
          pc.addEventListener('connectionstatechange', function () {
            if (pc && pc.connectionState === 'failed') {
              setStatus('连接失败，请检查网络或服务器', 'error');
            }
          });

          localStream.getTracks().forEach(function (track) {
            pc.addTrack(track, localStream);
          });

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          const response = await fetch(WHIP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: offer.sdp
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error('服务器返回 ' + response.status + (text ? ': ' + text.slice(0, 200) : ''));
          }

          const answerSdp = await response.text();
          await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

          setStatus('推流已连接，画面中的二维码会自动识别并保存', 'ok');
          btnStop.disabled = false;
          isPushing = true;
        } catch (e) {
          setStatus('推流失败: ' + (e.message || e.name), 'error');
          stopPush();
          btnStart.disabled = false;
        }
      }

      function stopPush() {
        isPushing = false;
        btnSwitch.disabled = true;
        btnSwitch.textContent = '切换摄像头';
        stopQrLoop();
        if (pc) {
          pc.close();
          pc = null;
        }
        if (localStream) {
          localStream.getTracks().forEach(function (t) { t.stop(); });
          localStream = null;
        }
        localVideo.srcObject = null;
        setPreviewVisible(false);
        setStatus('已停止直播', 'pending');
        btnStart.disabled = false;
        btnStop.disabled = true;

        // 停止后不再轮询请求状态，也清理倒计时
        if (statusPollTimer) {
          clearInterval(statusPollTimer);
          statusPollTimer = null;
        }
        if (requestCountdownTimer) {
          clearInterval(requestCountdownTimer);
          requestCountdownTimer = null;
        }
        if (requestTimerEl) {
          requestTimerEl.textContent = '';
        }

        // 主动结束时，上报直播状态为“已结束”
        try {
          ensureLoginValid();
          updateLiveState(loginData.userId, 2); // 2-已结束
        } catch (_) {}

        // 用户主动停止后，本轮直播请求流程结束，不再根据 SUCCESS 自动重新开播
        hasRequestedLive = false;
        savedRequestId = null; // 清除保存的 requestId
        savedLiveStreamId = null; // 清除保存的 liveStreamId
      }

      async function startAudioPlay() {
        if (playPc) return;
        if (!loginData || !loginData.mobile) {
          setStatus('无法播放音频：未获取到手机号', 'error');
          return;
        }
        btnPlayAudio.disabled = true;
        setStatus('正在连接音频流…', 'pending');
        try {
          playPc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
          });
          playPc.ontrack = function (e) {
            if (e.streams && e.streams[0]) {
              remoteAudio.srcObject = e.streams[0];
            } else if (e.track) {
              var s = new MediaStream();
              s.addTrack(e.track);
              remoteAudio.srcObject = s;
            }
          };
          playPc.addEventListener('connectionstatechange', function () {
            if (playPc && playPc.connectionState === 'failed') {
              setStatus('音频连接失败', 'error');
            }
          });
          
          // WHIP 协议：客户端创建 offer，POST 到服务器，服务器返回 answer
          const offer = await playPc.createOffer();
          await playPc.setLocalDescription(offer);
          
          var res = await fetch(WHIP_AUDIO_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/sdp' },
            body: offer.sdp
          });
          
          if (!res.ok) {
            var text = await res.text();
            throw new Error('服务器 ' + res.status + (text ? ': ' + text.slice(0, 150) : ''));
          }
          
          const answerSdp = await res.text();
          await playPc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
          
          setStatus('音频流已连接，正在播放', 'ok');
          btnPlayAudio.disabled = true;
          btnStopAudio.disabled = false;
        } catch (e) {
          setStatus('播放音频失败: ' + (e.message || e.name), 'error');
          stopAudioPlay();
          btnPlayAudio.disabled = false;
        }
      }

      function stopAudioPlay() {
        if (playPc) {
          playPc.close();
          playPc = null;
        }
        remoteAudio.srcObject = null;
        btnPlayAudio.disabled = false;
        btnStopAudio.disabled = true;
        if (!localStream && !pc) setStatus('就绪', 'pending');
      }

      // “请求直播”冷却倒计时：点击后 3 分钟内按钮置灰，右侧显示读秒
      function startRequestCooldown() {
        const DURATION_SEC = 180;
        requestCountdownEndTime = Date.now() + DURATION_SEC * 1000;
        if (requestCountdownTimer) {
          clearInterval(requestCountdownTimer);
        }
        updateRequestTimer();
        requestCountdownTimer = setInterval(updateRequestTimer, 1000);
      }

      function updateRequestTimer() {
        if (!requestTimerEl) return;
        const remaining = requestCountdownEndTime - Date.now();
        if (remaining <= 0) {
          clearInterval(requestCountdownTimer);
          requestCountdownTimer = null;
          requestTimerEl.textContent = '';
          if (!isPushing) {
            btnStart.disabled = false;
          }
          return;
        }
        const sec = Math.ceil(remaining / 1000);
        btnStart.disabled = true;
        requestTimerEl.textContent = sec + ' 秒后可再次请求直播';
      }

      // 轮询获取用户直播请求状态，用于右上角状态点 & 自动在 SUCCESS 后开播
      function startStatusPolling() {
        if (!loginData.userId) return;
        if (statusPollTimer) return;
        // 立即刷新一次
        (async function () {
          try {
            const s = await getLiveRequestStatus(loginData.userId);
            updateLiveStatusIndicator(s);
          } catch (_) {}
        })();
        statusPollTimer = setInterval(async function () {
          try {
            const userId = loginData.userId;
            if (!userId) return;
            const status = await getLiveRequestStatus(userId);
            updateLiveStatusIndicator(status);
            // 只有在用户已发起过直播请求且当前还未推流、且按钮处于冷却中时，才考虑自动开播
            if (status === 'SUCCESS'
                && hasRequestedLive
                && !isPushing
                && requestCountdownTimer) {
              // 不再重新获取 info，直接使用保存的 requestId
              await handleApprovedAndStart(userId, null);
            }
          } catch (e) {
            // 静默失败，避免打扰用户
          }
        }, 3000);
      }

      // 当检测到 SUCCESS（无论是按钮请求后立即返回，还是轮询时返回）时，统一走这里：
      // 1. 保存直播流地址 2. 更新直播状态为“直播中” 3. 调用 startPush() 真正开播
      async function handleApprovedAndStart(userId, info) {
        if (isPushing) return;
        // 优先使用保存的 requestId，不再重新获取
        var requestId = savedRequestId || (info && info.requestId ? info.requestId : '');
        var playUrl = BASE + '/live/' + STREAM_NAME + '.m3u8'; // 这里选择上报 HLS 播放地址
        
        // 调试：输出最终要传递的参数
        console.log('准备调用 saveLiveStream，参数：', { userId: userId, playUrl: playUrl, requestId: requestId, savedRequestId: savedRequestId });
        
        // 无论是否有 requestId，都尝试调用保存接口（后端可能允许空 requestId）
        try {
          await saveLiveStream(userId, playUrl, requestId);
        } catch (eStream) {
          console.error('保存直播流地址失败：', eStream);
          // 不阻断后续开播，仅在控制台提示
        }
        
        try {
          await updateLiveState(userId, 1); // 1-直播中
        } catch (eState) {
          console.warn('更新直播状态为直播中失败：', eState);
        }
        
        // 获取直播流信息，保存 liveStreamId 供后续上传二维码截图使用
        try {
          var streamInfo = await getLiveStreamInfo(userId);
          if (streamInfo && streamInfo.id) {
            savedLiveStreamId = streamInfo.id;
            console.log('保存 liveStreamId：', savedLiveStreamId);
          }
        } catch (e) {
          console.warn('获取直播流信息失败：', e);
        }
        
        setStatus('直播请求已批准，正在开始直播推流…', 'ok');
        await startPush();
      }

      btnPlayAudio.addEventListener('click', startAudioPlay);
      btnStopAudio.addEventListener('click', stopAudioPlay);

      // 点击“请求直播”按钮的处理：先发起/检查直播请求，只有审批通过才开始推流
      btnStart.addEventListener('click', async function () {
        try {
          ensureLoginValid();
        } catch (e) {
          setStatus(e.message || '登录已失效，请返回登录页重新登录', 'error');
          return;
        }

        var userId = loginData.userId;
        btnStart.disabled = true;
        setStatus('正在请求直播…', 'pending');

        try {
          // 先判断是否已有直播请求，没有则发起一个
          var hasReq = await checkHasLiveRequest(userId);
          if (!hasReq) {
            await createLiveRequest(userId);
          }
          hasRequestedLive = true;

          // 获取请求详情与状态，并保存 requestId
          var info = null;
          var status = '';
          try {
            info = await getLiveRequestInfo(userId);
            // 保存 requestId，供后续 SUCCESS 时使用
            if (info && info.requestId) {
              savedRequestId = info.requestId;
              console.log('保存 requestId：', savedRequestId);
            }
          } catch (_) {}
          try {
            status = await getLiveRequestStatus(userId);
          } catch (_) {}

          // 成功发起/获取直播请求后，启动 3 分钟冷却倒计时 & 状态轮询
          startRequestCooldown();
          startStatusPolling();

          // 使用后端约定的状态：
          // NO_REQUEST-无请求、PENDING-待处理、SUCCESS-已批准、FAIL-已拒绝、EXPIRED-已过期
          if (status === 'SUCCESS') {
            // 若立即返回 SUCCESS，则直接开始直播
            await handleApprovedAndStart(userId, info);
          } else {
            var readable = getReadableStatus(status);
            setStatus('当前直播请求状态为：' + readable + '，暂不能开始直播推流，请等待审核通过或重新发起请求。', 'pending');
            // 此时按钮保持置灰，由冷却倒计时恢复
          }
        } catch (e) {
          setStatus((e && e.message) ? ('请求直播失败：' + e.message) : '请求直播失败', 'error');
          btnStart.disabled = false;
        }
      });
      btnStop.addEventListener('click', stopPush);
      btnSwitch.addEventListener('click', switchCamera);
      // 进入页面时，尝试预获取媒体权限（不自动轮询状态，只有请求直播后才轮询）
      prewarmMedia();
    })();
  </script>
</body>
</html>
