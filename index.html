<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>登录 / 注册</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      width: 100%;
      max-width: 360px;
      padding: 24px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 20px;
      color: #fff;
      text-align: center;
    }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .auth-panel .form-group {
      margin-bottom: 16px;
    }
    .auth-panel label {
      display: block;
      font-size: 13px;
      color: #adb5bd;
      margin-bottom: 6px;
    }
    .auth-panel input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(0,0,0,0.2);
      color: #eee;
      outline: none;
    }
    .auth-panel input::placeholder { color: #868e96; }
    .auth-panel input:focus { border-color: #339af0; }
    .auth-panel .btn-submit {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      background: linear-gradient(135deg, #339af0, #228be6);
      color: #fff;
    }
    .auth-panel .btn-submit:active { opacity: 0.9; }
    .auth-msg {
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
      text-align: center;
    }
    .auth-msg.error { color: #ff6b6b; }
    .auth-msg.ok { color: #51cf66; }
    .toggle-wrap {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .btn-toggle {
      background: none;
      border: none;
      color: #74c0fc;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 16px;
      text-decoration: underline;
    }
    .btn-toggle:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1 id="authTitle">登录</h1>

    <div id="panelLogin" class="auth-panel active">
      <form id="formLogin">
        <div class="form-group">
          <label for="loginMobile">手机号</label>
          <input type="tel" id="loginMobile" name="mobile" placeholder="请输入手机号" autocomplete="tel" maxlength="11" />
        </div>
        <div class="form-group">
          <label for="loginPwd">密码</label>
          <input type="password" id="loginPwd" name="password" placeholder="请输入密码" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-submit" id="btnLoginSubmit">登录</button>
        <div id="msgLogin" class="auth-msg"></div>
      </form>
    </div>

    <div id="panelRegister" class="auth-panel">
      <form id="formRegister">
        <div class="form-group">
          <label for="regMobile">手机号</label>
          <input type="tel" id="regMobile" name="mobile" placeholder="请输入手机号" autocomplete="tel" maxlength="11" />
        </div>
        <div class="form-group">
          <label for="regName">用户名</label>
          <input type="text" id="regName" name="nickname" placeholder="请输入用户名" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="regPwd">密码</label>
          <input type="password" id="regPwd" name="password" placeholder="请输入密码（至少6位）" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="regPwd2">确认密码</label>
          <input type="password" id="regPwd2" name="password2" placeholder="请再次输入密码" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-submit" id="btnRegSubmit">注册</button>
        <div id="msgRegister" class="auth-msg"></div>
      </form>
    </div>

    <div class="toggle-wrap">
      <button type="button" class="btn-toggle" id="btnToggle">没有账号？去注册</button>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_LOGIN = 'liveh5_login';
      const REGISTER_API = 'http://10.112.149.184:48080/app-api/member/auth/register';
      const LOGIN_API = 'http://10.112.149.184:48080/app-api/member/auth/simple-login';

      const authTitle = document.getElementById('authTitle');
      const panelLogin = document.getElementById('panelLogin');
      const panelRegister = document.getElementById('panelRegister');
      const formLogin = document.getElementById('formLogin');
      const formRegister = document.getElementById('formRegister');
      const msgLogin = document.getElementById('msgLogin');
      const msgRegister = document.getElementById('msgRegister');
      const btnToggle = document.getElementById('btnToggle');
      const btnRegSubmit = document.getElementById('btnRegSubmit');
      const btnLoginSubmit = document.getElementById('btnLoginSubmit');

      function setLoggedIn(data) {
        try {
          localStorage.setItem(STORAGE_LOGIN, JSON.stringify(data));
        } catch (_) {}
      }

      function showPanel(panel) {
        panelLogin.classList.remove('active');
        panelRegister.classList.remove('active');
        panel.classList.add('active');
        if (panel === panelLogin) {
          authTitle.textContent = '登录';
          btnToggle.textContent = '没有账号？去注册';
          msgLogin.textContent = '';
          msgRegister.textContent = '';
        } else {
          authTitle.textContent = '注册';
          btnToggle.textContent = '已有账号？去登录';
          msgLogin.textContent = '';
          msgRegister.textContent = '';
        }
      }

      function showMsg(el, text, isError) {
        el.textContent = text;
        el.className = 'auth-msg' + (isError ? ' error' : ' ok');
      }

      btnToggle.addEventListener('click', function () {
        if (panelLogin.classList.contains('active')) {
          showPanel(panelRegister);
        } else {
          showPanel(panelLogin);
        }
      });

      formLogin.addEventListener('submit', function (e) {
        e.preventDefault();
        var mobile = (document.getElementById('loginMobile').value || '').trim().replace(/\s/g, '');
        var pwd = document.getElementById('loginPwd').value || '';
        if (!mobile) {
          showMsg(msgLogin, '请输入手机号', true);
          return;
        }
        if (!/^1\d{10}$/.test(mobile)) {
          showMsg(msgLogin, '请输入正确的手机号', true);
          return;
        }
        if (!pwd) {
          showMsg(msgLogin, '请输入密码', true);
          return;
        }
        btnLoginSubmit.disabled = true;
        showMsg(msgLogin, '登录中…', false);
        fetch(LOGIN_API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Tenant-Id': '1'
          },
          body: JSON.stringify({
            mobile: mobile,
            password: pwd
          })
        })
          .then(function (res) { return res.json(); })
          .then(function (json) {
            if (json.code === 0 && json.data && json.data.accessToken) {
              setLoggedIn({
                accessToken: json.data.accessToken,
                refreshToken: json.data.refreshToken || '',
                expiresTime: json.data.expiresTime || '',
                nickname: mobile,
                mobile: mobile,
                userId: json.data.userId
              });
              showMsg(msgLogin, '登录成功，正在跳转…', false);
              window.location.href = 'push.html';
            } else {
              showMsg(msgLogin, json.msg || '登录失败', true);
              btnLoginSubmit.disabled = false;
            }
          })
          .catch(function (err) {
            showMsg(msgLogin, '网络错误：' + (err.message || '请稍后重试'), true);
            btnLoginSubmit.disabled = false;
          });
      });

      formRegister.addEventListener('submit', function (e) {
        e.preventDefault();
        var mobile = (document.getElementById('regMobile').value || '').trim().replace(/\s/g, '');
        var nickname = (document.getElementById('regName').value || '').trim();
        var pwd = document.getElementById('regPwd').value || '';
        var pwd2 = document.getElementById('regPwd2').value || '';
        if (!mobile) {
          showMsg(msgRegister, '请输入手机号', true);
          return;
        }
        if (!/^1\d{10}$/.test(mobile)) {
          showMsg(msgRegister, '请输入正确的手机号', true);
          return;
        }
        if (!nickname) {
          showMsg(msgRegister, '请输入用户名', true);
          return;
        }
        if (pwd.length < 6) {
          showMsg(msgRegister, '密码至少 6 位', true);
          return;
        }
        if (pwd !== pwd2) {
          showMsg(msgRegister, '两次密码不一致', true);
          return;
        }
        btnRegSubmit.disabled = true;
        showMsg(msgRegister, '注册中…', false);
        fetch(REGISTER_API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Tenant-Id': '1'
          },
          body: JSON.stringify({
            mobile: mobile,
            password: pwd,
            nickname: nickname,
            mark: ''
          })
        })
          .then(function (res) { return res.json(); })
          .then(function (json) {
            if (json.code === 0 && json.data && json.data.accessToken) {
              setLoggedIn({
                accessToken: json.data.accessToken,
                refreshToken: json.data.refreshToken || '',
                expiresTime: json.data.expiresTime || '',
                nickname: nickname,
                mobile: mobile,
                userId: json.data.userId
              });
              showMsg(msgRegister, '注册成功，正在跳转…', false);
              window.location.href = 'push.html';
            } else {
              showMsg(msgRegister, json.msg || '注册失败', true);
              btnRegSubmit.disabled = false;
            }
          })
          .catch(function (err) {
            showMsg(msgRegister, '网络错误：' + (err.message || '请稍后重试'), true);
            btnRegSubmit.disabled = false;
          });
      });

      if (localStorage.getItem(STORAGE_LOGIN)) {
        window.location.href = 'push.html';
      }
    })();
  </script>
</body>
</html>
