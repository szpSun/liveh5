<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BBQK 接口测试</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 13px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }
    button:disabled {
      opacity: 0.6;
    }
    .status {
      font-size: 14px;
      margin-bottom: 12px;
      color: #fbbf24;
    }
    .ok { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <h1>BBQK 接口测试</h1>

  <div class="card">
    <div class="label">请求地址</div>
    <pre id="apiUrl">https://livestreamuser.h3r.website/decode_bbqk</pre>
  </div>

  <div class="card">
    <div class="label">请求体</div>
    <pre id="requestBody"></pre>
  </div>

  <div class="status" id="status">等待发送</div>

  <button id="btnSend">发送测试请求</button>

  <div class="card" style="margin-top: 12px;">
    <div class="label">返回结果</div>
    <pre id="result">暂无返回</pre>
  </div>

  <script>
    (function () {
      var API_URL = 'https://livestreamuser.h3r.website/decode_bbqk';
      var PAYLOAD = {
        url: 'http://bbqk.com/w23kyj'
      };

      var apiUrlEl = document.getElementById('apiUrl');
      var requestBodyEl = document.getElementById('requestBody');
      var statusEl = document.getElementById('status');
      var resultEl = document.getElementById('result');
      var btnSend = document.getElementById('btnSend');

      apiUrlEl.textContent = API_URL;
      requestBodyEl.textContent = JSON.stringify(PAYLOAD, null, 2);

      async function sendRequest() {
        btnSend.disabled = true;
        statusEl.className = 'status';
        statusEl.textContent = '请求中...';
        resultEl.textContent = '等待接口返回...';

        try {
          var res = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(PAYLOAD)
          });

          var text = await res.text();
          var output = [
            'HTTP 状态: ' + res.status + ' ' + res.statusText,
            '',
            '响应内容:',
            text || '(空)'
          ].join('\n');

          resultEl.textContent = output;
          statusEl.className = 'status ' + (res.ok ? 'ok' : 'error');
          statusEl.textContent = res.ok ? '请求成功' : '请求返回非 2xx';
        } catch (err) {
          resultEl.textContent = [
            '请求异常:',
            err && err.name ? ('name: ' + err.name) : '',
            err && err.message ? ('message: ' + err.message) : '',
            err ? String(err) : ''
          ].filter(Boolean).join('\n');
          statusEl.className = 'status error';
          statusEl.textContent = '请求失败';
        } finally {
          btnSend.disabled = false;
        }
      }

      btnSend.addEventListener('click', sendRequest);
    })();
  </script>
</body>
</html>
